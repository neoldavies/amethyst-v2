<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amethyst Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amethyst: #6a1b9a;
            --dark-bg: #1a0f1f;
            --gold: #d4af37;
            --text: #f5f5f5;
            --danger: #ff4d4d;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }
        #game-container {
            width: 95vw;
            max-width: 420px;
            height: 96dvh;
            background: #25162b;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        /* COMPACT HEADER */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            flex-shrink: 0;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .utility-btns { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1rem; padding: 2px; }
        /* COMPACT STATS */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: bold;
            flex-shrink: 0;
        }
        /* DYNAMIC GRID CONTAINER */
        #grid-container {
            flex: 1; /* Takes remaining space */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; /* Critical for shrinking on mobile */
            padding: 10px 0;
        }
        #grid {
            display: grid;
            gap: 8px;
            width: 100%;
            max-height: 100%; /* Force grid to fit in container */
            aspect-ratio: 1 / 1;
            margin: auto;
            transition: transform 0.6s ease;
        }
        .card {
            background: linear-gradient(145deg, #3a2244, #25162b);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: 0.3s;
            position: relative;
        }
        .card span {
            display: none; font-size: 1.8rem;
            pointer-events: none; text-align: center;
        }
        .text-card span { font-size: 0.65rem; font-weight: bold; padding: 4px; line-height: 1.1; }
        .card.flipped { background: var(--amethyst); border-color: var(--gold); transform: rotateY(180deg); }
        .card.flipped span { display: block; transform: rotateY(-180deg); }
        .card.matched { opacity: 0; transform: scale(0.5); pointer-events: none; }
        /* ROTATION */
        #grid.rotated { transform: rotate(180deg); }
        #grid.rotated.smart-orient span { transform: rotateY(-180deg) rotateZ(180deg); }
        /* BOTTOM TEXT */
        .footer { flex-shrink: 0; padding-top: 5px; text-align: center; }
        .hint { font-size: 0.6rem; color: rgba(255,255,255,0.3); }
        /* OVERLAY - Perfect Center */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 15, 31, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 12px; padding: 20px; text-align: center;
        }
        .main-btn {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 25px; font-family: 'Playfair Display', serif;
            font-size: 1rem; cursor: pointer; border-radius: 4px; margin-top: 15px;
        }
        #timer.timer-warning { color: var(--danger); font-weight: bold; }
        body.high-contrast .card.flipped { background: #fff !important; color: #000 !important; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="top-nav">
        <div style="font-size: 0.7rem; color: var(--gold)">SCORE: <span id="score-val">0</span></div>
        <div class="brand">Amethyst Glow</div>
        <div class="utility-btns">
            <button class="icon-btn" onclick="toggleA11y()">👁️</button>
            <button id="btn-mute" class="icon-btn" onclick="toggleMute()">🔊</button>
            <button class="icon-btn" onclick="togglePause()">⏸️</button>
        </div>
    </div>
    <div class="stats-bar">
        <div>LVL <span id="level-val">1</span></div>
        <div id="timer-box"><span id="timer">10.5</span>S</div>
    </div>
    <div id="grid-container">
        <div id="grid"></div>
    </div>
    <div class="footer">
        <p class="hint" id="level-hint"></p>
    </div>
    <div id="overlay" class="overlay">
        <h2 id="overlay-title" style="color:var(--gold); font-family:'Playfair Display';"></h2>
        <p id="overlay-msg" style="margin:8px 0; font-size: 0.9rem;"></p>
        <div id="bonus-info" style="color:#4dff88; font-weight:bold; font-size:0.75rem"></div>
        <button class="main-btn" onclick="initAndStart()">Begin</button>
    </div>
</div>
<script>
    const data = [
        {e: '✨', t: 'GLOW'}, {e: '💎', t: 'GEMS'}, {e: '💄', t: 'LIPS'},
        {e: '🧴', t: 'LOTION'}, {e: '🧖‍♀️', t: 'SPA'}, {e: '✂️', t: 'CUT'},
        {e: '💅', t: 'NAILS'}, {e: '💆‍♀️', t: 'RELAX'}, {e: '🎨', t: 'ART'}, {e: '🪞', t: 'MIRROR'}
    ];
    let level = 1, score = 0, timeLeft = 10.5, timerInterval, audioCtx = null;
    let flippedCards = [], matchedPairs = 0, isProcessing = false, isPaused = false;
    let seen = new Set(), errors = 0, isUpsideDown = false;
    let isMuted = false, isA11y = false;
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('amethyst_glow_v7'));
        if (saved) { level = saved.level || 1; score = saved.score || 0; isMuted = saved.muted || false; isA11y = saved.a11y || false; }
        document.getElementById('score-val').innerText = score;
        updateMuteUI();
        if(isA11y) document.body.classList.add('high-contrast');
        showOverlay("Amethyst Glow", "A test of memory and focus.", "Start Game");
    };
    function showOverlay(title, msg, btnText) {
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-msg').innerText = msg;
        document.querySelector('#overlay button').innerText = btnText;
        document.getElementById('overlay').style.display = 'flex';
    }
    function toggleMute() { isMuted = !isMuted; updateMuteUI(); save(); }
    function updateMuteUI() { document.getElementById('btn-mute').innerText = isMuted ? '🔇' : '🔊'; }
    function toggleA11y() { isA11y = !isA11y; document.body.classList.toggle('high-contrast', isA11y); save(); initGrid(); }
    function save() { localStorage.setItem('amethyst_glow_v7', JSON.stringify({level, score, muted: isMuted, a11y: isA11y})); }
    function togglePause() {
        if (timeLeft <= 0) return;
        isPaused = !isPaused;
        if (isPaused) {
            clearInterval(timerInterval);
            document.getElementById('grid').style.visibility = 'hidden';
            showOverlay("Paused", "Relax. Progress saved.", "Resume");
        } else {
            document.getElementById('grid').style.visibility = 'visible';
            document.getElementById('overlay').style.display = 'none';
            runTimer();
        }
    }
    function playSound(type) {
        if (isMuted || !audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'thump') {
            osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.1);
        } else if (type === 'win') {
            osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.4);
        } else if (type === 'lose') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
            gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.5);
        }
    }
    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }
    function startLevel() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('bonus-info').innerText = "";
        isPaused = false; matchedPairs = 0; flippedCards = []; seen.clear(); errors = 0; isUpsideDown = false;
        const grid = document.getElementById('grid');
        grid.classList.remove('rotated', 'smart-orient');
        grid.style.transform = 'rotate(0deg)';
        timeLeft = parseFloat(((10 + (level - 1) * 5) * 1.05).toFixed(1));
        document.getElementById('level-val').innerText = level;
        document.getElementById('score-val').innerText = score;
        initGrid();
        runTimer();
    }
    function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.style.visibility = 'visible';
        let pairsCount = Math.min(2 + level, 10);
        let cols = (level < 3) ? 2 : (level < 6 ? 3 : 4);
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        let type = "icon";
        if (level >= 5 && level < 10) type = Math.random() > 0.5 ? "text" : "icon";
        else if (level >= 10) type = "hybrid";
        if (isA11y) type = "text";
        let currentSet = data.slice(0, pairsCount);
        let cards = [];
        currentSet.forEach(item => {
            if (type === "hybrid") {
                cards.push({ id: item.e, val: item.e, isText: false }, { id: item.e, val: item.t, isText: true });
            } else if (type === "text") {
                cards.push({ id: item.e, val: item.t, isText: true }, { id: item.e, val: item.t, isText: true });
            } else {
                cards.push({ id: item.e, val: item.e, isText: false }, { id: item.e, val: item.e, isText: false });
            }
        });
        cards.sort(() => Math.random() - 0.5).forEach(c => {
            const card = document.createElement('div');
            card.className = 'card' + (c.isText ? ' text-card' : '');
            card.dataset.id = c.id;
            card.innerHTML = `<span>${c.val}</span>`;
            card.onclick = () => handleCardClick(card);
            grid.appendChild(card);
        });
        document.getElementById('level-hint').innerText = `Level ${level}: ${type.toUpperCase()}`;
    }
    function runTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let prev = Math.floor(timeLeft);
            timeLeft = parseFloat((timeLeft - 0.1).toFixed(1));
            if (timeLeft <= 3 && timeLeft > 0 && Math.floor(timeLeft) !== prev) playSound('thump');
            updateUI();
            if (timeLeft <= 0) { playSound('lose'); gameOver(); }
        }, 100);
    }
    function updateUI() {
        const el = document.getElementById('timer');
        el.innerText = timeLeft <= 0 ? "0.0" : timeLeft.toFixed(1);
        el.classList.toggle('timer-warning', (timeLeft <= 5 && timeLeft > 0));
    }
    function handleCardClick(card) {
        if (isProcessing || isPaused || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped');
        flippedCards.push(card);
        if (flippedCards.length === 2) checkMatch();
    }
    function checkMatch() {
        isProcessing = true;
        const [c1, c2] = flippedCards;
        if (c1.dataset.id === c2.dataset.id) {
            matchedPairs++; score += 2;
            timeLeft = Math.min(timeLeft + Math.min(level, 5), 60);
            if ("vibrate" in navigator) navigator.vibrate(50);
            setTimeout(() => {
                c1.classList.add('matched'); c2.classList.add('matched');
                if (level >= 5) {
                    isUpsideDown = !isUpsideDown;
                    const g = document.getElementById('grid');
                    g.classList.toggle('rotated', isUpsideDown);
                    g.classList.toggle('smart-orient', level < 8);
                }
                flippedCards = []; isProcessing = false;
                if (matchedPairs === (document.querySelectorAll('.card').length / 2)) triggerWin();
            }, 500);
        } else {
            if (seen.has(c1.dataset.id) || seen.has(c2.dataset.id)) {
                errors++; score = Math.max(0, score - 1);
                if (level >= 5) timeLeft = Math.max(0, timeLeft - 1);
                if ("vibrate" in navigator) navigator.vibrate([40, 30, 40]);
            }
            seen.add(c1.dataset.id); seen.add(c2.dataset.id);
            setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; isProcessing = false; }, 800);
        }
        document.getElementById('score-val').innerText = score;
    }
    function triggerWin() {
        clearInterval(timerInterval);
        let bonus = (errors === 0) ? 30 : 10;
        score += bonus; level++; save(); playSound('win');
        setTimeout(() => {
            document.getElementById('bonus-info').innerText = (errors === 0) ? "FLAWLESS! +30" : "+10 Points";
            showOverlay("Radiant Finish!", `Score: ${score}`, `Begin Level ${level}`);
        }, 1000);
    }
    function gameOver() {
        clearInterval(timerInterval);
        showOverlay("Time's Up", `Final Score: ${score}`, "Restart");
        document.querySelector('#overlay button').onclick = () => { level = 1; score = 0; save(); startLevel(); };
    }
</script>
</body>
</html>
