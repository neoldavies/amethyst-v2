<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Glow - Beauty Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --amethyst: #6a1b9a;
            --dark-bg: #1a0f1f;
            --gold: #d4af37;
            --text: #f5f5f5;
            --danger: #ff4d4d;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 90%;
            max-width: 400px;
            background: #25162b;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }
        .utility-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 10px;
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--gold);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            opacity: 0.7;
            transition: 0.3s;
        }
        .icon-btn:hover, .icon-btn.active { opacity: 1; transform: scale(1.1); }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin: 0 0 10px 0;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--gold);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 8px;
        }
        #grid-wrapper { perspective: 1000px; }
        #grid {
            display: grid;
            gap: 10px;
            margin: 0 auto;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            width: 100%;
        }
        .card {
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #3a2244, #25162b);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            transform-style: preserve-3d;
            word-break: break-all;
            padding: 5px;
        }
        .card.flipped { background: var(--amethyst); border-color: var(--gold); transform: rotateY(180deg); }
        .card.matched { opacity: 0; transform: scale(0.5); pointer-events: none; }
        .card span { display: none; pointer-events: none; transition: transform 0.8s; text-align: center;}
        .card.flipped span { display: block; transform: rotateY(-180deg); }
        .card.text-card span {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #grid.rotated { transform: rotate(180deg); }
        #grid.rotated.smart-orient .card span { transform: rotateY(-180deg) rotateZ(180deg); }
        #grid.rotated.full-invert .card span { transform: rotateY(-180deg) rotateZ(0deg); }
        body.high-contrast .card.flipped {
            background: white !important;
            color: black !important;
            border: 3px solid black;
        }
        body.high-contrast .card span { font-size: 0.7rem !important; }
        #timer { font-weight: bold; width: 50px; display: inline-block; }
        .timer-warning { color: var(--danger) !important; animation: danger-pulse 0.6s infinite alternate; }
        @keyframes danger-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 15, 31, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 14px;
        }
        .overlay button {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px 30px;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
        }
        .hint { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-top: auto; padding-top: 10px; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="utility-bar">
        <button id="btn-a11y" class="icon-btn" title="Toggle Accessibility" onclick="toggleA11y()">👁️</button>
        <button id="btn-mute" class="icon-btn" title="Toggle Sound" onclick="toggleMute()">🔊</button>
        <button id="btn-pause" class="icon-btn" title="Pause Game" onclick="togglePause()">⏸️</button>
    </div>
    <div class="stats-bar">
        <div>Lvl <span id="level-val">1</span></div>
        <div style="font-weight: bold;">SCORE: <span id="score-val">0</span></div>
        <div><span id="timer">10.5</span>s</div>
    </div>

    <h1>Amethyst Glow</h1>
    <div id="grid-wrapper">
        <div id="grid"></div>
    </div>
    <div id="overlay" class="overlay">
        <h2 id="overlay-title" style="color: var(--gold); font-family: 'Playfair Display';"></h2>
        <p id="overlay-msg"></p>
        <div id="bonus-info" style="color: #4dff88; font-weight: bold;"></div>
        <button id="action-btn" onclick="initAndStart()">Begin Level</button>
    </div>
    <p class="hint" id="level-hint"></p>
</div>
<script>
    const beautyData = [
        {e: '✨', t: 'GLOW'}, {e: '💎', t: 'GEMS'}, {e: '💄', t: 'LIPS'},
        {e: '🧴', t: 'LOTION'}, {e: '🧖‍♀️', t: 'SPA'}, {e: '✂️', t: 'CUT'},
        {e: '💅', t: 'NAILS'}, {e: '💆‍♀️', t: 'RELAX'}, {e: '🎨', t: 'ART'}, {e: '🪞', t: 'MIRROR'}
    ];
    let level = 1, score = 0, timeLeft = 10.5, timerInterval, audioCtx = null;
    let flippedCards = [], matchedPairs = 0, isProcessing = false, isPaused = false;
    let seenIcons = new Set(), errorsInLevel = 0, isUpsideDown = false;
    let isMuted = false, isA11y = false;
    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('amethyst_glow_v4'));
        if (saved) {
            level = saved.level || 1;
            score = saved.score || 0;
            isMuted = saved.muted || false;
            isA11y = saved.a11y || false;
            document.getElementById('score-val').innerText = score;
            applySettings();
        }
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay-title').innerText = "Amethyst Glow";
        document.getElementById('overlay-msg').innerText = "A test of memory and focus.";
    };
    function saveState() {
        localStorage.setItem('amethyst_glow_v4', JSON.stringify({ level, score, muted: isMuted, a11y: isA11y }));
    }
    function applySettings() {
        document.getElementById('btn-mute').innerText = isMuted ? '🔇' : '🔊';
        document.getElementById('btn-a11y').classList.toggle('active', isA11y);
        document.body.classList.toggle('high-contrast', isA11y);
    }
    function toggleMute() { isMuted = !isMuted; applySettings(); saveState(); }
    function toggleA11y() { isA11y = !isA11y; applySettings(); saveState(); initGrid(); }

    function togglePause() {
        if (matchedPairs === (document.querySelectorAll('.card').length / 2) || timeLeft <= 0) return;
        isPaused = !isPaused;
        const grid = document.getElementById('grid');
        if (isPaused) {
            clearInterval(timerInterval);
            grid.style.visibility = 'hidden';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "Paused";
            document.getElementById('overlay-msg').innerText = "Take a breath.";
            document.getElementById('action-btn').innerText = "Resume";
            document.getElementById('action-btn').onclick = togglePause;
        } else {
            grid.style.visibility = 'visible';
            document.getElementById('overlay').style.display = 'none';
            runTimer();
        }
    }
    function playSound(type) {
        if (isMuted || !audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'thump') {
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'lose') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(); osc.stop(now + 0.5);
        } else if (type === 'win') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523, now);
            osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(); osc.stop(now + 0.4);
        }
    }
    function initAndStart() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startLevel();
    }
    function startLevel() {
        document.getElementById('overlay').style.display = 'none';
        isPaused = false; matchedPairs = 0; flippedCards = [];
        seenIcons.clear(); errorsInLevel = 0; isUpsideDown = false;

        const grid = document.getElementById('grid');
        grid.classList.remove('rotated', 'smart-orient', 'full-invert');

        timeLeft = parseFloat(((10 + (level - 1) * 5) * 1.05).toFixed(1));
        document.getElementById('level-val').innerText = level;
        document.getElementById('score-val').innerText = score;

        initGrid();

        let modeHint = level < 5 ? "Match the Icons" : (level < 10 ? "Word or Icon Round!" : "HYBRID MODE: Match Icon to Word");
        document.getElementById('level-hint').innerText = `Lvl ${level}: ${modeHint}`;

        runTimer();
    }
    function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.style.visibility = 'visible';

        let pairsCount = Math.min(2 + level, 10);
        let cols = (level < 3) ? 2 : 4;
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        let currentSet = beautyData.slice(0, pairsCount);
        let cardData = [];
        let roundType = "icon";
        if (level >= 5 && level < 10) {
            roundType = Math.random() > 0.5 ? "text" : "icon";
        } else if (level >= 10) {
            roundType = "hybrid";
        }
        if (isA11y) roundType = "text";
        currentSet.forEach(item => {
            if (roundType === "hybrid") {
                cardData.push({ id: item.e, display: item.e, type: 'icon' });
                cardData.push({ id: item.e, display: item.t, type: 'text' });
            } else if (roundType === "text") {
                cardData.push({ id: item.e, display: item.t, type: 'text' });
                cardData.push({ id: item.e, display: item.t, type: 'text' });
            } else {
                cardData.push({ id: item.e, display: item.e, type: 'icon' });
                cardData.push({ id: item.e, display: item.e, type: 'icon' });
            }
        });
        cardData.sort(() => Math.random() - 0.5);
        cardData.forEach(data => {
            const card = document.createElement('div');
            card.className = 'card';
            if (data.type === 'text') card.classList.add('text-card');
            card.dataset.id = data.id;
            card.innerHTML = `<span>${data.display}</span>`;
            card.onclick = () => handleCardClick(card);
            grid.appendChild(card);
        });
    }
    function runTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            let prevSec = Math.floor(timeLeft);
            timeLeft = parseFloat((timeLeft - 0.1).toFixed(1));
            let currSec = Math.floor(timeLeft);
            if (timeLeft <= 3.1 && timeLeft > 0 && currSec !== prevSec) playSound('thump');
            updateTimerDisplay();
            if (timeLeft <= 0) gameOver();
        }, 100);
    }
    function updateTimerDisplay() {
        const el = document.getElementById('timer');
        el.innerText = timeLeft <= 0 ? "0.0" : timeLeft.toFixed(1);
        el.classList.toggle('timer-warning', (timeLeft <= 5 && timeLeft > 0));
    }
    function handleCardClick(card) {
        if (isProcessing || isPaused || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped');
        flippedCards.push(card);
        if (flippedCards.length === 2) checkMatch();
    }
    function checkMatch() {
        isProcessing = true;
        const [c1, c2] = flippedCards;
        if (c1.dataset.id === c2.dataset.id) {
            matchedPairs++; score += 2;
            timeLeft = Math.min(timeLeft + Math.min(level, 5), 60);

            setTimeout(() => {
                c1.classList.add('matched'); c2.classList.add('matched');
                if (level >= 5) {
                    isUpsideDown = !isUpsideDown;
                    const grid = document.getElementById('grid');
                    grid.classList.toggle('rotated', isUpsideDown);
                    if (level >= 5 && level <= 7) grid.classList.add('smart-orient');
                    else if (level >= 8) grid.classList.add('full-invert');
                }
                flippedCards = []; isProcessing = false;
                if (matchedPairs === document.querySelectorAll('.card').length / 2) triggerVictory();
            }, 500);
        } else {
            if (seenIcons.has(c1.dataset.id) || seenIcons.has(c2.dataset.id)) {
                errorsInLevel++; score = Math.max(0, score - 1);
                if (level >= 5) timeLeft = Math.max(0, timeLeft - 1);
            }
            seenIcons.add(c1.dataset.id); seenIcons.add(c2.dataset.id);
            setTimeout(() => {
                c1.classList.remove('flipped'); c2.classList.remove('flipped');
                flippedCards = []; isProcessing = false;
            }, 800);
        }
        document.getElementById('score-val').innerText = score;
    }
    function triggerVictory() {
        clearInterval(timerInterval);
        const flawless = (errorsInLevel === 0);
        score += flawless ? 30 : 10;
        level++;
        saveState();
        playSound('win');
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "Radiant Finish!";
            document.getElementById('overlay-msg').innerText = flawless ? "Perfect Round! +30 pts" : "Level Complete! +10 pts";
            document.getElementById('action-btn').innerText = `Begin Level ${level}`;
            document.getElementById('action-btn').onclick = initAndStart;
        }, 1000);
    }
    function gameOver() {
        clearInterval(timerInterval);
        playSound('lose');
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay-title').innerText = "Time Refresh";
        document.getElementById('overlay-msg').innerText = `Final Score: ${score}. Try again?`;
        document.getElementById('action-btn').innerText = "Restart Game";
        document.getElementById('action-btn').onclick = () => { level = 1; score = 0; saveState(); startLevel(); };
    }
</script>
</body>
</html>
